#: The basic colors

foreground                      #c5c9c5
background                      #000000
selection_foreground            #7fb4ca
selection_background            #2d4f67

#: Cursor colors

cursor                          #7fb4ca

#: URL underline color when overing with mouse

url_color                       #7aa89f

#: Tab bar colors

active_tab_foreground           #7fb4ca
active_tab_background           #1f1f28
inactive_tab_foreground         #727169
inactive_tab_background         #181616

#: The basic 16 colors

#: black
color0  #090618
color8  #727169

#: red
color1  #e46876
color9  #e82424

#: green
color2  #8a9a7b
color10 #98bb6c

#: yellow
color3  #E6C384
color11 #ffe5b6

#: blue
color4  #7e9cd8
color12 #7fb4ca

#: magenta
color5  #a292a3
color13 #938aa9

#: cyan
color6  #6a9589
color14 #7aa89f

#: white
color7  #feffff
color15 #dcd7ba


