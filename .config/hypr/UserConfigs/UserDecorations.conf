# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  # border_size = 2
  gaps_in = 5
  gaps_out = 8
  
  # col.active_border = $color12 
  # col.inactive_border = $color10

# shadow os the border
  border_size = 1

  col.active_border = rgb(2D2D2D)
  col.inactive_border =  rgb(4D4D4D)
}

decoration {
  #rounding = 10
  rounding = 16
         
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.3

  shadow {
    enabled = true
    range = 21
    color = 0x7C000000
    color_inactive = 0x59000000

# ---------------
    # enabled = true
    # range = 3
    # render_power = 1

    # color =  $color12
    # color_inactive = $color10
  }


  blur {
    enabled = true	
    size = 6
    passes = 2
    ignore_opacity = true
    new_optimizations = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $color15

	groupbar {
    indicator_height = 24
    col.active = $color2
    text_offset = -19
    col.inactive = $color2
    gaps_out = 2
    gaps_in = 2
    priority = 1
    enabled = true
    rounding = 10
    round_only_edges = true
		col.active = $color0
  }
}
